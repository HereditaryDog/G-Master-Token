{% extends "base.html" %}

{% block title %}登录 | {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Welcome back</p>
        <h1>登录商城账号</h1>
        <p class="muted">使用用户名或邮箱地址登录，并输入验证码完成人机验证。</p>
        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {% for field in form %}
                <label class="field">
                    <span>{{ field.label }}</span>
                    {% if field.name == "captcha" %}
                        <div class="inline-field">
                            {{ field }}
                            <button type="button" class="captcha-box captcha-box--button" id="refresh-captcha-button">{{ captcha_value }}</button>
                        </div>
                        <small class="muted">点击右侧验证码即可刷新。</small>
                    {% else %}
                        {{ field }}
                    {% endif %}
                    {% if field.errors %}
                        <small class="error-text">{{ field.errors|join:", " }}</small>
                    {% endif %}
                </label>
            {% endfor %}
            <button type="submit" class="primary-button">登录</button>
        </form>
        <p class="muted">忘记密码？<a href="{% url 'password_reset' %}">通过邮箱找回</a></p>
        <p class="muted">还没有账号？<a href="{% url 'accounts:signup' %}">去注册</a></p>
    </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const refreshButton = document.getElementById("refresh-captcha-button");
    if (!refreshButton) {
        return;
    }

    refreshButton.addEventListener("click", async function () {
        refreshButton.disabled = true;
        try {
            const response = await fetch("{% url 'accounts:login_captcha' %}");
            const data = await response.json();
            if (data.ok && data.captcha) {
                refreshButton.textContent = data.captcha;
            }
        } finally {
            refreshButton.disabled = false;
        }
    });
});
</script>
{% endblock %}
