{% extends "base.html" %}

{% block title %}登录 | {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Welcome back</p>
        <h1>登录商城账号</h1>
        <p class="muted">使用用户名或邮箱地址登录，并输入验证码完成人机验证。</p>
        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {% for field in form %}
                <label class="field">
                    <span>{{ field.label }}</span>
                    {% if field.name == "captcha" %}
                        <div class="inline-field">
                            {{ field }}
                            <span class="captcha-box">{{ captcha_value }}</span>
                        </div>
                        <small class="muted">看不清验证码时，刷新当前页面即可更换。</small>
                    {% else %}
                        {{ field }}
                    {% endif %}
                    {% if field.errors %}
                        <small class="error-text">{{ field.errors|join:", " }}</small>
                    {% endif %}
                </label>
            {% endfor %}
            <button type="submit" class="primary-button">登录</button>
        </form>
        <p class="muted">还没有账号？<a href="{% url 'accounts:signup' %}">去注册</a></p>
    </div>
</section>
{% endblock %}
