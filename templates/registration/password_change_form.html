{% extends "base.html" %}

{% block title %}修改密码 | {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Password Change</p>
        <h1>修改登录密码</h1>
        <p class="muted">输入当前密码，并设置新的登录密码。</p>
        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {% for field in form %}
                <label class="field">
                    <span>{{ field.label }}</span>
                    {{ field }}
                    {% if field.help_text %}
                        <small class="muted">{{ field.help_text|force_escape }}</small>
                    {% endif %}
                    {% if field.errors %}
                        <small class="error-text">{{ field.errors|join:", " }}</small>
                    {% endif %}
                </label>
            {% endfor %}
            <button type="submit" class="primary-button">保存新密码</button>
        </form>
        <p class="muted"><a href="{% url 'shop:account_center' %}">返回账号中心</a></p>
    </div>
</section>
{% endblock %}
