{% extends "base.html" %}

{% block title %}找回密码 | {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Password Reset</p>
        <h1>找回账号密码</h1>
        <p class="muted">输入注册邮箱，我们会把密码重置链接发送到你的邮箱。</p>
        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {% for field in form %}
                <label class="field">
                    <span>{{ field.label }}</span>
                    {{ field }}
                    {% if field.errors %}
                        <small class="error-text">{{ field.errors|join:", " }}</small>
                    {% endif %}
                </label>
            {% endfor %}
            <button type="submit" class="primary-button">发送重置链接</button>
        </form>
        <p class="muted">想起密码了？<a href="{% url 'accounts:login' %}">返回登录</a></p>
    </div>
</section>
{% endblock %}
