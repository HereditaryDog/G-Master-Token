{% extends "base.html" %}

{% block title %}邮件已发送 | {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Check Email</p>
        <h1>重置邮件已发送</h1>
        <p class="muted">如果该邮箱已注册，我们已经发送了密码重置链接。请检查收件箱和垃圾邮件。</p>
        <p class="muted">收到邮件后，点击其中的链接即可设置新密码。</p>
        <p class="muted">返回<a href="{% url 'accounts:login' %}">登录页</a></p>
    </div>
</section>
{% endblock %}
