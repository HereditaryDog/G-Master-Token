{% extends "base.html" %}

{% block title %}注册 | {{ site_name }}{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <p class="eyebrow">Create account</p>
        <h1>创建你的账号</h1>
        <p class="muted">填写用户名、邮箱、手机号、密码，并通过邮箱验证码完成验证后即可注册。</p>
        <form method="post" class="form-grid" id="signup-form">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {% for field in form %}
                <label class="field">
                    <span>{{ field.label }}</span>
                    {% if field.name == "email_code" %}
                        <div class="inline-field">
                            {{ field }}
                            <button type="button" class="ghost-button" id="send-code-button">发送验证码</button>
                        </div>
                        <small class="muted" id="send-code-status">验证码会发送到你填写的邮箱地址。</small>
                    {% else %}
                        {{ field }}
                    {% endif %}
                    {% if field.errors %}
                        <small class="error-text">{{ field.errors|join:", " }}</small>
                    {% endif %}
                </label>
            {% endfor %}
            <button type="submit" class="primary-button">立即注册</button>
        </form>
    </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const emailInput = document.getElementById("id_email");
    const sendButton = document.getElementById("send-code-button");
    const statusText = document.getElementById("send-code-status");
    const csrfToken = document.querySelector("#signup-form input[name='csrfmiddlewaretoken']").value;

    if (!sendButton || !emailInput) {
        return;
    }

    sendButton.addEventListener("click", async function () {
        const email = emailInput.value.trim();
        if (!email) {
            statusText.textContent = "请先输入邮箱地址。";
            return;
        }

        sendButton.disabled = true;
        statusText.textContent = "正在发送验证码...";

        try {
            const response = await fetch("{% url 'accounts:signup_send_code' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": csrfToken,
                },
                body: new URLSearchParams({ email }),
            });
            const data = await response.json();
            statusText.textContent = data.message;
        } catch (error) {
            statusText.textContent = "发送失败，请稍后重试。";
        } finally {
            sendButton.disabled = false;
        }
    });
});
</script>
{% endblock %}
